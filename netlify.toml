[build]
  command   = "node scripts/inject-config.js"
  publish   = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[redirects]]
  from   = "/api/admin/*"
  to     = "/.netlify/functions/admin/:splat"
  status = 200

[[redirects]]
  from   = "/api/checkout"
  to     = "/.netlify/functions/checkout"
  status = 200

[functions]
  node_bundler = "esbuild"
